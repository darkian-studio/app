name: Feature request
description: Suggest an idea or improvement for Darkian Studio
title: "[Feature] "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea? Tell us what you want and why it matters.
  - type: textarea
    id: problem
    attributes:
      label: Problem or need
      description: What are you trying to do that DS does not support today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like DS to behave?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Editor
        - Terminal / runtime
        - LSP / language support
        - Debugging
        - Git
        - Extensions
        - Onboarding / setup
        - Updates / releases
        - Other
    validations:
      required: false
